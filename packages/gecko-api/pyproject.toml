[project]
name = "gecko-api"
version = "0.1.0"
description = "FastAPI service for Gecko — wraps gecko-core for the V2 web app at app.geckovision.tech."
requires-python = ">=3.11"
dependencies = [
    "gecko-core",
    # S22-MCP-HOST-03 — mount FastMCP Streamable HTTP at /mcp. Workspace
    # sibling, not a new external package; the MCP SDK is already a
    # transitive dep via gecko-mcp.
    "gecko-mcp",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "python-dotenv>=1.0",
    "x402[svm]>=2.8.0",
    "cachetools>=5.0",
    "slowapi>=0.1.9",
    "httpx>=0.27",
]

[dependency-groups]
dev = [
    "respx>=0.21",
    # S12-BAZAAR-03 — validation harness for Bazaar discovery extensions.
    # Already pulled in transitively via x402; pinned here to make the
    # dependency explicit since tests/api/test_bazaar_extensions.py imports it.
    "jsonschema>=4.0",
]

[project.scripts]
gecko-api = "gecko_api.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gecko_api"]
