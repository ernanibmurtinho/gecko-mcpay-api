[project]
name = "gecko-mcp"
version = "0.1.8"
description = "MCP server for Gecko — exposes gecko_research, gecko_ask, gecko_sources to Claude Code."
requires-python = ">=3.11"
dependencies = [
    "gecko-core",
    "mcp>=1.0",
    "click>=8.1",
    "python-dotenv>=1.0",
    "solders>=0.21",
    "cryptography>=42",
    "httpx>=0.27",
    "x402[svm]>=2.8.0",
]

[project.scripts]
gecko-mcp = "gecko_mcp.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gecko_mcp"]
