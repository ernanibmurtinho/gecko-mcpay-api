[project]
name = "gecko-core"
version = "0.2.1"
description = "Builder Bootstrap Platform SDK — pure business logic. CLI, MCP, and API import this."
requires-python = ">=3.11"
dependencies = [
    "openai>=1.40",
    "supabase>=2.5",
    "tavily-python>=0.3",
    "httpx>=0.27",
    "youtube-transcript-api>=0.6",
    "tiktoken>=0.7",
    "beautifulsoup4>=4.12",
    "lxml>=4.9",
    "pydantic>=2.7",
    "pydantic-settings>=2.4",
    "tenacity>=8.5",
    "pyautogen>=0.2",
    "ag2[openai]>=0.8",
    "deepgram-sdk>=3.7",
    "yt-dlp>=2025.1",
    "numpy>=1.26",
    "motor>=3.5",
    "pypdfium2>=4.30",
    # S17-INGEST-FALLBACK-01 — multi-parser PDF fallback chain.
    # pdfium fails on a non-trivial fraction of in-the-wild PDFs (PDFium
    # data-format errors on lightly-malformed headers); pdfminer.six is
    # pure-Python and more permissive but slower; pypdf has a different
    # bug surface again. 3-of-3 failure ≈ genuinely unparseable.
    "pdfminer.six>=20240706",
    "pypdf>=4.3",
    # EIP-3009 buyer-side signer for the CDP/Base path (S12-CDP-01).
    # x402[svm] doesn't pull this; we need it explicitly for EVM signing.
    "eth-account>=0.13",
    "x402[evm,svm]>=2.8.0",
    "voyageai>=0.2",
]

[project.optional-dependencies]
# S19-VOYAGE-RERANK-01 — Voyage AI post-retrieval reranker. voyageai is now a
# core dependency (S22-VOYAGE-EMBED) so this extra is kept for backwards compat
# only — `uv sync --extra rerank` is a no-op but won't break existing installs.
rerank = ["voyageai>=0.2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gecko_core"]
