[project]
name = "gecko-core"
version = "0.1.4"
description = "Builder Bootstrap Platform SDK — pure business logic. CLI, MCP, and API import this."
requires-python = ">=3.11"
dependencies = [
    "openai>=1.40",
    "supabase>=2.5",
    "tavily-python>=0.3",
    "httpx>=0.27",
    "youtube-transcript-api>=0.6",
    "tiktoken>=0.7",
    "beautifulsoup4>=4.12",
    "lxml>=4.9",
    "pydantic>=2.7",
    "pydantic-settings>=2.4",
    "tenacity>=8.5",
    "pyautogen>=0.2",
    "ag2[openai]>=0.8",
    "deepgram-sdk>=3.7",
    "yt-dlp>=2025.1",
    "numpy>=1.26",
    "motor>=3.5",
    "pypdfium2>=4.30",
    # EIP-3009 buyer-side signer for the CDP/Base path (S12-CDP-01).
    # x402[svm] doesn't pull this; we need it explicitly for EVM signing.
    "eth-account>=0.13",
    "x402[evm,svm]>=2.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gecko_core"]
