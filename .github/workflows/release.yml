name: Release to PyPI

# Triggers:
#   - Push a tag like v0.1.1 or v0.1.1-mcp / v0.1.1-core to release a specific package
#   - Manual dispatch from the Actions tab for emergency re-publish
#
# Trusted Publisher setup (PyPI side):
#   gecko-mcp  → owner: ernanibmurtinho, repo: gecko-mcpay-api, workflow: release.yml, env: release
#   gecko-core → owner: ernanibmurtinho, repo: gecko-mcpay-api, workflow: release.yml, env: release
#
# Both PyPI projects must have the publisher configured before the first OIDC publish works.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Which package to publish"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - gecko-core
          - gecko-mcp

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.target.outputs.target }}
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.30"

      - name: Determine target packages
        id: target
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "target=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF#refs/tags/}"
            case "$tag" in
              *-mcp)  echo "target=gecko-mcp"  >> "$GITHUB_OUTPUT" ;;
              *-core) echo "target=gecko-core" >> "$GITHUB_OUTPUT" ;;
              *)      echo "target=all"       >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Build gecko-core
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'gecko-core'
        run: |
          uv build --package gecko-core --out-dir dist/core

      - name: Build gecko-mcp
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'gecko-mcp'
        run: |
          uv build --package gecko-mcp --out-dir dist/mcp

      - name: Upload core dists
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'gecko-core'
        uses: actions/upload-artifact@v5
        with:
          name: gecko-core-dist
          path: dist/core/*

      - name: Upload mcp dists
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'gecko-mcp'
        uses: actions/upload-artifact@v5
        with:
          name: gecko-mcp-dist
          path: dist/mcp/*

  publish-core:
    name: Publish gecko-core to PyPI
    needs: build
    if: needs.build.outputs.target == 'all' || needs.build.outputs.target == 'gecko-core'
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/gecko-core/
    permissions:
      id-token: write   # required for PyPI OIDC trusted publishing
    steps:
      - name: Download core dists
        uses: actions/download-artifact@v5
        with:
          name: gecko-core-dist
          path: dist
      - name: Publish gecko-core
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # Fail loudly when the version already exists on PyPI — usually
          # means we forgot to bump pyproject.toml before tagging. The silent
          # skip on v0.1.2 (where versions stayed at 0.1.1) cost a few hours.
          skip-existing: false

  publish-mcp:
    name: Publish gecko-mcp to PyPI
    needs: build
    if: needs.build.outputs.target == 'all' || needs.build.outputs.target == 'gecko-mcp'
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/gecko-mcp/
    permissions:
      id-token: write
    steps:
      - name: Download mcp dists
        uses: actions/download-artifact@v5
        with:
          name: gecko-mcp-dist
          path: dist
      - name: Publish gecko-mcp
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # Fail loudly when the version already exists on PyPI — usually
          # means we forgot to bump pyproject.toml before tagging. The silent
          # skip on v0.1.2 (where versions stayed at 0.1.1) cost a few hours.
          skip-existing: false

  dispatch-installer-bump:
    # GC-03: notify gecko-claude that a new gecko-mcp version is on PyPI so its
    # installer pin (install.sh GECKO_MCP_VERSION) gets auto-bumped via PR.
    # Receiver workflow lives in ernanibmurtinho/gecko-claude (issue #6 there).
    #
    # Required secret: GECKO_CLAUDE_DISPATCH_TOKEN
    #   Fine-grained PAT scoped to ernanibmurtinho/gecko-claude with:
    #     - "Contents: Read and write" (to push the bump branch)
    #     - "Pull requests: Read and write" (to open the PR)
    #     - "Metadata: Read"
    #   Set in repo Settings → Secrets and variables → Actions.
    name: Dispatch installer-version bump to gecko-claude
    needs: publish-mcp
    if: needs.build.outputs.target == 'all' || needs.build.outputs.target == 'gecko-mcp'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve published version
        id: ver
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual re-publish — pull version from gecko-mcp/pyproject.toml on the default branch.
            version=$(curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/packages/gecko-mcp/pyproject.toml" \
              | grep -E '^version\s*=' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          else
            tag="${GITHUB_REF#refs/tags/}"
            # Strip leading v and any -mcp / -core suffix
            version="${tag#v}"
            version="${version%-mcp}"
            version="${version%-core}"
          fi
          if [[ -z "$version" ]]; then
            echo "::error::Could not resolve gecko-mcp version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Dispatching version=$version"

      - name: repository_dispatch → gecko-claude
        env:
          DISPATCH_TOKEN: ${{ secrets.GECKO_CLAUDE_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${DISPATCH_TOKEN:-}" ]]; then
            echo "::warning::GECKO_CLAUDE_DISPATCH_TOKEN not set; skipping dispatch (release succeeded but installer pin won't auto-bump)."
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/ernanibmurtinho/gecko-claude/dispatches" \
            -d "$(jq -nc \
                --arg version "${{ steps.ver.outputs.version }}" \
                --arg tag "${GITHUB_REF#refs/tags/}" \
                --arg sha "${{ github.sha }}" \
                '{event_type: "gecko-mcp-released", client_payload: {version: $version, tag: $tag, source_sha: $sha}}')"
          echo "Dispatched gecko-mcp-released v${{ steps.ver.outputs.version }} to gecko-claude"
